# Package definitions for dotfiles installation
# Categories: system, desktop, wayland, dev-tools
# Paru handles both official and AUR packages

system:
  description: "System Utilities - Performance, updates, and optimization"
  packages:
    - cachy-update  # CachyOS system updater
    - bpftune-git  # BPF-based auto-tuning for system performance
    - profile-sync-daemon  # Sync browser profiles to RAM for speed

desktop:
  description: "Desktop Environment - Hyprland and essential GUI tools"
  packages:
    - hyprland  # Wayland compositor
    - ly  # Login manager
    - hyprlauncher  # Application launcher
    - mako  # Notification daemon
    - hyprlock  # Screen locker
    - hyprpaper  # Wallpaper daemon
    - kitty  # Terminal emulator
    - nautilus  # GUI file manager
    - yazi  # CLI file manager
    - gnome-keyring  # Credential storage and management
    - seahorse  # GUI for managing gnome-keyring
    - ttf-jetbrains-mono-nerd  # JetBrains Mono with Nerd Font icons
    - noto-fonts  # Standard sans-serif font
    - noto-fonts-cjk  # CJK language support
    - noto-fonts-emoji  # Emoji support
    - ttf-font-awesome  # Icon font for UI elements
    - eww  # Status bar widget system
    - uwsm  # Universal Wayland session manager
    - socat # For workspaces widget
  
wayland:
  description: "Wayland Essentials - Clipboard, portals, and utilities"
  packages:
    - wl-clipboard  # Wayland clipboard utilities
    - xdg-desktop-portal-hyprland  # Desktop portal for Hyprland
    - kanshi  # Multi-monitor management
    - grim  # Screenshot tool
    - slurp  # Region selector for screenshots
    - hyprpolkitagent  # Polkit authentication agent

dev-tools:
  description: "Development Tools - Containers, editors, browsers"
  packages:
    - docker  # Container platform
    - docker-compose  # Multi-container orchestration
    - neovim  # Modern vim-based text editor
    - code  # Visual Studio Code (OSS)
    - fzf  # Fuzzy finder for command line
    - fd  # Fast file finder (used by fzf)
    - fish  # Fish shell
    - fisher  # Fish shell plugin manager
    - github-cli  # GitHub CLI (gh command)
    - github-copilot-cli  # GitHub Copilot CLI
    - zen-browser-bin  # Zen browser
    - lazydocker-bin  # Docker TUI management
    - onlyoffice-bin  # Office suite
