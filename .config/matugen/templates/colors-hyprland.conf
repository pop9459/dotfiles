# Apply to Hyprland
general {
    col.active_border = rgb($blue) rgb($lavender) 45deg
    col.inactive_border = rgb($surface0)
}

group {
    col.border_active = rgb($blue)
    col.border_inactive = rgb($surface0)
    col.border_locked_active = rgb($peach)
    col.border_locked_inactive = rgb($surface0)
    
    groupbar {
        col.active = rgb($blue)
        col.inactive = rgb($surface0)
        col.locked_active = rgb($peach)
        col.locked_inactive = rgb($surface0)
    }
}
