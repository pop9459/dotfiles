#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# D-Bus environment update for keyring detection (fixes VS Code/Copilot CLI Secret Service API)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd GTK_THEME

# GNOME keyring daemon (secrets for VS Code/Copilot)
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11,ssh,gpg
exec-once = systemctl --user restart gnome-keyring-daemon
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1  # polkit helper, often needed too

# Eww widgets + bar
exec-once = eww daemon & eww open bar

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

