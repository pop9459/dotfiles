# #######################################################################################
# HYPRLAND CONFIG - MODULAR STRUCTURE
# #######################################################################################
#
# This config is split into multiple files for better organization.
# Each file is located in ~/.config/hypr/conf/
#
# Edit individual files to customize specific aspects of your setup:
# - monitors.conf     : Monitor configuration
# - programs.conf     : Default applications
# - autostart.conf    : Startup programs
# - environment.conf  : Environment variables
# - appearance.conf   : Look and feel (borders, gaps, shadows, blur)
# - animations.conf   : Animation settings
# - layouts.conf      : Window layout settings (dwindle, master)
# - input.conf        : Input device settings (keyboard, mouse, touchpad)
# - keybinds.conf     : Keyboard shortcuts and bindings
# - windowrules.conf  : Window rules and workspace rules
#
# #######################################################################################

# Source modular config files
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/programs.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/environment.conf
source = ~/.config/hypr/conf/appearance.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/layouts.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/windowrules.conf

# Soruce matugen color theme file
source = ~/.config/hypr/colors.conf
